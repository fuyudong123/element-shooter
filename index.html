<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="元素射手">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<title>元素射手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Microsoft YaHei','PingFang SC',sans-serif;touch-action:none}
canvas{display:block}

/* ===== HUD ===== */
#hud{position:fixed;top:env(safe-area-inset-top,8px);left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 16px;pointer-events:none}
#hud>*{pointer-events:auto}
#playerHealthWrap{background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 12px;min-width:160px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#playerHealthLabel{color:rgba(255,255,255,0.9);font-size:12px;margin-bottom:3px;display:flex;justify-content:space-between}
#playerHealthBarOuter{width:100%;height:12px;background:rgba(255,255,255,0.12);border-radius:6px;overflow:hidden}
#playerHealthBarInner{width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12,#2ecc71);border-radius:6px;transition:width .15s ease}
#healthText{color:rgba(255,255,255,0.8);font-size:11px}
#enemyCount{background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

/* ===== 准星 ===== */
#crosshair{position:fixed;top:50%;left:50%;z-index:10;transform:translate(-50%,-50%);pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.7)}
#crosshair::before{width:2px;height:16px;top:-8px;left:-1px}
#crosshair::after{width:16px;height:2px;top:-1px;left:-8px}
#crosshair-dot{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.5);position:absolute;top:-1px;left:-1px}
#crosshair-hit{position:fixed;top:50%;left:50%;z-index:9;transform:translate(-50%,-50%);width:36px;height:36px;pointer-events:none;border:2px solid rgba(255,255,100,0);border-radius:50%;transition:border-color .08s ease}

/* ===== 伤害闪烁 ===== */
#damageFlash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:8;pointer-events:none;background:rgba(255,0,0,0);transition:background .1s ease}

/* ===== 触控按钮 ===== */
#touch-controls{position:fixed;bottom:env(safe-area-inset-bottom,12px);left:0;right:0;z-index:20;height:200px}

/* 摇杆底座（在左半屏定位） */
#joystick-area{position:absolute;left:24px;bottom:10px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#joystick-knob{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.4),rgba(255,255,255,0.15));border:2px solid rgba(255,255,255,0.25);transform:translate(0,0);transition:none;pointer-events:none}

/* 右侧按钮群 */
#btn-group{position:absolute;right:16px;bottom:10px;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.btn-circle{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .1s;-webkit-tap-highlight-color:transparent}
.btn-circle:active,.btn-circle.pressed{transform:scale(0.88)}
#btn-shoot{background:radial-gradient(circle,rgba(255,80,60,0.45),rgba(200,40,20,0.25));width:72px;height:72px;font-size:20px;color:#fff;text-shadow:0 0 8px rgba(255,100,50,0.6);border-color:rgba(255,100,60,0.4)}
#btn-shoot:active,#btn-shoot.pressed{background:radial-gradient(circle,rgba(255,100,80,0.6),rgba(200,40,20,0.35))}
#btn-jump{width:52px;height:52px;background:radial-gradient(circle,rgba(100,200,255,0.3),rgba(60,150,220,0.15));color:rgba(255,255,255,0.8);font-size:14px;border-color:rgba(100,200,255,0.25)}
#btn-crouch{width:46px;height:46px;background:radial-gradient(circle,rgba(200,180,100,0.25),rgba(180,150,60,0.12));color:rgba(255,255,255,0.7);font-size:13px;border-color:rgba(200,180,100,0.2)}

#btn-row{display:flex;gap:8px;align-items:flex-end}

/* 在非触屏设备上隐藏触控 */
@media (hover:hover){#touch-controls{display:none!important}}

/* ===== 覆盖层 ===== */
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,0.78);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px env(safe-area-inset-right,20px) 20px env(safe-area-inset-left,20px)}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(32px,8vw,52px);margin-bottom:8px;letter-spacing:3px}
#overlay h1.win{color:#2ecc71;text-shadow:0 0 40px rgba(46,204,113,0.4)}
#overlay h1.lose{color:#e74c3c;text-shadow:0 0 40px rgba(231,76,60,0.4)}
#overlay p{font-size:clamp(13px,3.2vw,16px);color:rgba(255,255,255,0.65);margin-bottom:4px;line-height:1.6}
#overlay .key{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:0 7px;font-size:clamp(11px,2.8vw,14px)}
#overlay .btn{margin-top:20px;padding:14px 44px;font-size:clamp(16px,4vw,20px);cursor:pointer;pointer-events:auto;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(102,126,234,0.3)}
#overlay .btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(102,126,234,0.45)}
#overlay .btn-restart{background:linear-gradient(135deg,#f093fb,#f5576c)}
#overlay .btn-restart:hover{box-shadow:0 6px 28px rgba(245,87,108,0.45)}
#stats{margin-top:10px;font-size:clamp(12px,3vw,14px);color:rgba(255,255,255,0.45)}
#killList{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:11;pointer-events:none;text-align:center;color:#ffdd44;font-size:14px;text-shadow:0 0 12px rgba(255,200,50,0.5)}
.kill-msg{animation:killFade 1.2s ease forwards;margin-bottom:4px}
@keyframes killFade{0%{opacity:0;transform:translateY(10px) scale(0.9)}20%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
    <div id="playerHealthWrap">
        <div id="playerHealthLabel"><span>⚡ 能量</span><span id="healthText">100 / 100</span></div>
        <div id="playerHealthBarOuter"><div id="playerHealthBarInner"></div></div>
    </div>
    <div id="enemyCount">👾 <span id="enemyCountNum">0</span></div>
</div>

<!-- 准星 -->
<div id="crosshair"><div id="crosshair-dot"></div></div>
<div id="crosshair-hit"></div>
<div id="damageFlash"></div>
<div id="killList"></div>

<!-- 触控 -->
<div id="touch-controls">
    <div id="joystick-area"><div id="joystick-knob"></div></div>
    <div id="btn-group">
        <button class="btn-circle" id="btn-shoot">⚡</button>
        <div id="btn-row">
            <button class="btn-circle" id="btn-jump">↑</button>
            <button class="btn-circle" id="btn-crouch">↓</button>
        </div>
    </div>
</div>

<!-- 覆盖层 -->
<div id="overlay">
    <h1 id="overlayTitle">✨ 元素射手</h1>
    <p>消灭所有敌人即可获胜</p>
    <p id="key-hints">
        <span class="key">W A S D</span> 移动 &nbsp;
        <span class="key">鼠标</span> 视角 &nbsp;
        <span class="key">左键</span> 射击 &nbsp;
        <span class="key">空格</span> 跳跃 &nbsp;
        <span class="key">Shift</span> 下蹲
    </p>
    <button class="btn" id="startBtn">开始冒险</button>
    <div id="stats"></div>
</div>

<script type="importmap">{
"imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}</script>
<script type="module">
import*as THREE from'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

// ============ 常量 ============
const MAP=14,WALL_H=3.5,PLAYER_H=1.7,CROUCH_H=0.8,SPEED=6,JUMP_V=6.5,GRAV=-18,SENS=0.002;
const P_MAX_HP=100,ENEMY_HP=70,DMG=12,ENEMY_FIRE=2000,ENEMY_PS=10,ENEMY_DMG=5;
const ELEMENT_COLORS=[
    {p:0xff4422,s:0xff8844,a:0xffcc00,n:'火'},
    {p:0x3388ff,s:0x66bbff,a:0xffffff,n:'水'},
    {p:0xaa44ff,s:0xcc66ff,a:0xffee66,n:'雷'},
    {p:0x33ddbb,s:0x66ffcc,a:0xffffff,n:'风'},
    {p:0x66ccff,s:0x99ddff,a:0xffffff,n:'冰'},
    {p:0xffaa33,s:0xffcc66,a:0xffdd88,n:'岩'},
];

// ============ DOM ============
const $=id=>document.getElementById(id);
const overlay=$('overlay'),overlayTitle=$('overlayTitle'),startBtn=$('startBtn');
const healthInner=$('playerHealthBarInner'),healthText=$('healthText');
const enemyCountNum=$('enemyCountNum'),statsDiv=$('stats'),damageFlash=$('damageFlash');
const crosshairHit=$('crosshair-hit'),killList=$('killList'),keyHints=$('key-hints');
const joyArea=$('joystick-area'),joyKnob=$('joystick-knob');
const btnShoot=$('btn-shoot'),btnJump=$('btn-jump'),btnCrouch=$('btn-crouch');

// ============ Three.js ============
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,28,42);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,60);
camera.position.set(0,PLAYER_H,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.prepend(renderer.domElement);
const css2d=new CSS2DRenderer();
css2d.setSize(innerWidth,innerHeight);
css2d.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none';
document.body.prepend(css2d.domElement);

// ============ 光照（二次元风格，多色环境光） ============
scene.add(new THREE.AmbientLight(0x445577,0.45));
const hemi=new THREE.HemisphereLight(0xaaaaff,0xffaa88,0.55);
scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffeedd,1.3);
sun.position.set(12,18,8);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=0.5;sun.shadow.camera.far=50;
sun.shadow.camera.left=-20;sun.shadow.camera.right=20;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;
scene.add(sun);
// 背光补光
const rim=new THREE.DirectionalLight(0x8888ff,0.3);
rim.position.set(-10,5,-12);
scene.add(rim);

// ============ 地图 ============
const floor=new THREE.Mesh(
    new THREE.PlaneGeometry(MAP*2,MAP*2),
    new THREE.MeshToonMaterial({color:0x222244})
);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;
scene.add(floor);
const grid=new THREE.GridHelper(MAP*2,28,0x4444aa,0x333366);
grid.position.y=0.02;scene.add(grid);

const wallMat=new THREE.MeshToonMaterial({color:0x3a3a5a});
function addWall(cx,cz,w,h,ry){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.3),wallMat);
    m.position.set(cx,h/2,cz);m.rotation.y=ry;
    m.castShadow=m.receiveShadow=true;scene.add(m);
    return m;
}
addWall(0,-MAP,MAP*2,WALL_H,0);addWall(0,MAP,MAP*2,WALL_H,0);
addWall(-MAP,0,0.3,WALL_H,0);addWall(MAP,0,0.3,WALL_H,0);
const cm=new THREE.MeshToonMaterial({color:0x3a3a5a});
for(const[x,z]of[[-MAP,-MAP],[MAP,-MAP],[-MAP,MAP],[MAP,MAP]]){
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.3,WALL_H,0.3),cm);
    p.position.set(x,WALL_H/2,z);scene.add(p);
}

const crateMat=new THREE.MeshToonMaterial({color:0x6a5a4a});
const crateMat2=new THREE.MeshToonMaterial({color:0x4a6a4a});
const obs=[];
function addObs(x,z,w,h,d,mat){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,h/2,z);m.castShadow=m.receiveShadow=true;
    scene.add(m);obs.push(m);return m;
}
addObs(-6,-6,2,1.2,2,crateMat);addObs(7,-5,2,1,2,crateMat2);
addObs(-7,6,2,1.4,2,crateMat);addObs(5,7,2,0.8,2,crateMat2);
addObs(-3,0,1.2,0.6,1.2,crateMat);addObs(4,-2,1.2,0.6,1.2,crateMat2);
addObs(0,4,1.5,0.7,1.5,crateMat);
const pm=new THREE.MeshToonMaterial({color:0x555588});
function addPillar(x,z,r,h){
    const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,12),pm);
    m.position.set(x,h/2,z);m.castShadow=m.receiveShadow=true;
    scene.add(m);obs.push(m);return m;
}
addPillar(-8,-8,0.4,2.5);addPillar(8,8,0.4,2.5);
addPillar(-8,8,0.4,2.5);addPillar(8,-8,0.4,2.5);

// ============ 玩家 ============
const player={
    pos:new THREE.Vector3(0,PLAYER_H,11),vel:new THREE.Vector3(0,0,0),
    yaw:0,pitch:0,hp:P_MAX_HP,onGround:false,crouching:false,height:PLAYER_H,inv:0,
};

// ============ 能量武器 ============
function createGun(){
    const g=new THREE.Group();
    const gMat=new THREE.MeshToonMaterial({color:0x7788aa});
    const dMat=new THREE.MeshToonMaterial({color:0x445566});
    const emit=new THREE.MeshToonMaterial({color:0x3399ff,emissive:0x3399ff,emissiveIntensity:0.6});
    const coreMat=new THREE.MeshToonMaterial({color:0x66ddff,emissive:0x44aaff,emissiveIntensity:1});

    // 枪身（流线型）
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.3,8),gMat);
    body.rotation.x=Math.PI/2;body.position.set(0,0,0.02);
    g.add(body);

    // 枪管（发光）
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.035,0.25,8),emit);
    barrel.rotation.x=Math.PI/2;barrel.position.set(0,0.01,-0.15);
    g.add(barrel);

    // 能量核心（悬浮旋转球）
    const core=new THREE.Mesh(new THREE.SphereGeometry(0.035,10,10),coreMat);
    core.position.set(0,-0.04,0.1);
    core.userData.isCore=true;
    g.add(core);

    // 核心光环
    const glow=new THREE.Mesh(new THREE.TorusGeometry(0.05,0.008,8,12),new THREE.MeshToonMaterial({color:0x44aaff,emissive:0x44aaff,emissiveIntensity:0.4,transparent:true,opacity:0.5}));
    glow.position.set(0,-0.04,0.1);glow.rotation.x=Math.PI/2;
    glow.userData.isGlow=true;
    g.add(glow);

    // 握把
    const grip=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.08,0.04),dMat);
    grip.position.set(0,-0.07,0.06);
    g.add(grip);

    // 枪口环
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.04,0.01,8,12),new THREE.MeshToonMaterial({color:0x66aaee,emissive:0x4488dd,emissiveIntensity:0.3}));
    ring.position.set(0,0.01,-0.28);ring.rotation.x=Math.PI/2;
    g.add(ring);

    g.position.set(0.22,-0.2,-0.5);
    return g;
}
const gun=createGun();
camera.add(gun);
scene.add(camera);

// ============ 敌人（二次元风格） ============
const enemies=[],enemyProjectiles=[],particles=[];

function createAnimeEnemy(x,z,elIdx){
    const el=ELEMENT_COLORS[elIdx];
    const g=new THREE.Group();

    const skin=new THREE.MeshToonMaterial({color:0xffeedd});
    const hairMat=new THREE.MeshToonMaterial({color:el.p});
    const outfit=new THREE.MeshToonMaterial({color:el.s});
    const accent=new THREE.MeshToonMaterial({color:el.a,emissive:el.a,emissiveIntensity:0.2});
    const eyeWhite=new THREE.MeshToonMaterial({color:0xffffff});
    const pupilMat=new THREE.MeshToonMaterial({color:0x333333});
    const highlight=new THREE.MeshToonMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.3});

    // 头（Q版偏大）
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12),skin);
    head.position.y=0.85;head.scale.set(1,0.92,0.88);
    g.add(head);

    // 头发（锥形）
    const hair=new THREE.Mesh(new THREE.ConeGeometry(0.24,0.2,8),hairMat);
    hair.position.y=1.05;
    g.add(hair);
    // 侧发
    const sideHairL=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.18,0.04),hairMat);
    sideHairL.position.set(-0.18,0.88,0);sideHairL.rotation.z=0.15;
    g.add(sideHairL);
    const sideHairR=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.18,0.04),hairMat);
    sideHairR.position.set(0.18,0.88,0);sideHairR.rotation.z=-0.15;
    g.add(sideHairR);

    // 眼睛（大眼二次元风格）
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10),eyeWhite);
    eyeL.position.set(-0.08,0.9,-0.18);eyeL.scale.set(1,0.7,0.3);
    g.add(eyeL);
    const eyeR=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10),eyeWhite);
    eyeR.position.set(0.08,0.9,-0.18);eyeR.scale.set(1,0.7,0.3);
    g.add(eyeR);

    // 瞳孔
    const pL=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),pupilMat);
    pL.position.set(-0.08,0.895,-0.205);pL.scale.set(1,0.8,0.2);
    g.add(pL);
    const pR=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),pupilMat);
    pR.position.set(0.08,0.895,-0.205);pR.scale.set(1,0.8,0.2);
    g.add(pR);

    // 高光
    const hL=new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6),highlight);
    hL.position.set(-0.06,0.91,-0.21);
    g.add(hL);
    const hR=new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6),highlight);
    hR.position.set(0.10,0.91,-0.21);
    g.add(hR);

    // 身体
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.35,8),outfit);
    body.position.y=0.38;
    g.add(body);

    // 领结/装饰
    const bow=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.04,0.02),accent);
    bow.position.set(0,0.56,0.15);
    g.add(bow);

    // 手臂
    const armMat=new THREE.MeshToonMaterial({color:0xffeedd});
    const aL=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.04,0.22,6),armMat);
    aL.position.set(-0.22,0.4,0);aL.rotation.z=0.2;
    g.add(aL);
    const aR=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.04,0.22,6),armMat);
    aR.position.set(0.22,0.4,0);aR.rotation.z=-0.2;
    g.add(aR);

    // 腿
    const legMat=new THREE.MeshToonMaterial({color:el.s});
    const lL=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.055,0.16,6),legMat);
    lL.position.set(-0.1,0.12,0);
    g.add(lL);
    const lR=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.055,0.16,6),legMat);
    lR.position.set(0.1,0.12,0);
    g.add(lR);
    // 鞋子
    const shoeMat=new THREE.MeshToonMaterial({color:el.p});
    const sL=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.04,0.12),shoeMat);
    sL.position.set(-0.1,0.02,0.02);
    g.add(sL);

let btnTouchIds={};

document.addEventListener('touchstart',e=>{
    if(gameState!=='playing')return;
    // 按钮自己处理，我们只记录 ID 防止冲突
    for(const t of e.changedTouches){
        const el=document.elementFromPoint(t.clientX,t.clientY);
        if(el&&(el.id==='btn-shoot'||el.id==='btn-jump'||el.id==='btn-crouch'||el.closest('#btn-group'))){
            btnTouchIds[t.identifier]=true;
            continue;
        }
        // 左半屏 → 摇杆（且不在按钮区）
        if(t.clientX<window.innerWidth*0.45&&touch.joystick.id<0){
            e.preventDefault();
            touch.joystick.id=t.identifier;
            updateJoystickPos(t);
        }
        // 右半屏 → 视角控制
        else if(t.clientX>=window.innerWidth*0.45&&touch.look.id<0){
            e.preventDefault();
            touch.look.id=t.identifier;
            touch.look.lx=t.clientX;
            touch.look.ly=t.clientY;
        }
    }
},{passive:false});

document.addEventListener('touchmove',e=>{
    if(gameState!=='playing')return;
    for(const t of e.changedTouches){
        if(t.identifier===touch.joystick.id){
            e.preventDefault();
            updateJoystickPos(t);
        }else if(t.identifier===touch.look.id){
            e.preventDefault();
            const dx=t.clientX-touch.look.lx;
            const dy=t.clientY-touch.look.ly;
            touch.look.lx=t.clientX;
            touch.look.ly=t.clientY;
            player.yaw-=dx*0.005;
            player.pitch-=dy*0.005;
            player.pitch=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,player.pitch));
        }
    }
},{passive:false});

document.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
        delete btnTouchIds[t.identifier];
        if(t.identifier===touch.joystick.id){
            touch.joystick.id=-1;touch.joystick.dx=0;touch.joystick.dy=0;
            joyKnob.style.transform='translate(0,0)';
        }
        if(t.identifier===touch.look.id){
            touch.look.id=-1;
        }
    }
});
document.addEventListener('touchcancel',e=>{
    for(const t of e.changedTouches){
        delete btnTouchIds[t.identifier];
        if(t.identifier===touch.joystick.id){
            touch.joystick.id=-1;touch.joystick.dx=0;touch.joystick.dy=0;
            joyKnob.style.transform='translate(0,0)';
        }
        if(t.identifier===touch.look.id) touch.look.id=-1;

});

function updateJoystickPos(t){
    const rect=joyArea.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const maxR=50;
    let dx=t.clientX-cx,dy=t.clientY-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
    touch.joystick.dx=dx/maxR;touch.joystick.dy=dy/maxR;
    joyKnob.style.transform=`translate(${dx}px,${dy}px)`;
}

// ============ 射击 ============
let muzzleFlash=null,shootCD=0,shotsFired=0,shotsHit=0;

function shoot(){
    if(shootCD>0)return;
    shootCD=0.12;shotsFired++;

    // 枪口闪光
    if(muzzleFlash){gun.remove(muzzleFlash);muzzleFlash=null;}
    const flash=new THREE.Mesh(
        new THREE.SphereGeometry(0.07,8,8),
        new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:0.9})
    );
    flash.position.set(0,0.01,-0.3);
    gun.add(flash);muzzleFlash=flash;
    setTimeout(()=>{if(muzzleFlash===flash){gun.remove(flash);muzzleFlash=null;}},50);

    // 后坐力
    gun.position.z=-0.44;
    setTimeout(()=>gun.position.z=-0.5,60);

    // 扩散光环
    const ring=new THREE.Mesh(
        new THREE.TorusGeometry(0.05,0.008,8,12),
        new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:0.6})
    );
    ring.position.set(0,0.01,-0.3);
    gun.add(ring);
    const start=performance.now();
    function animRing(){
        const t=(performance.now()-start)/200;
        if(t>=1){gun.remove(ring);return;}
        ring.scale.set(1+t*3,1+t*3,1);
        ring.material.opacity=0.6*(1-t);
        requestAnimationFrame(animRing);
    }
    requestAnimationFrame(animRing);

    // 命中检测
    const raycaster=new THREE.Raycaster();
    raycaster.setFromCamera({x:0,y:0},camera);
    const targets=enemies.filter(e=>e.alive).map(e=>{
        const ms=[];e.group.traverse(c=>{if(c.isMesh)ms.push(c)});return ms;
    }).flat();
    const hits=raycaster.intersectObjects(targets);
    if(hits.length>0){
        let hitEnemy=null;
        for(const e of enemies){
            if(!e.alive)continue;
            let found=false;
            e.group.traverse(c=>{if(c===hits[0].object)found=true});
            if(found){hitEnemy=e;break;}
        }
        if(hitEnemy){
            shotsHit++;
            hitEnemy.hp-=DMG;
            hitEnemy.hitFlash=0.2;
            const pct=Math.max(0,hitEnemy.hp/hitEnemy.maxHp)*100;
            hitEnemy.hpFill.style.width=pct+'%';
            hitEnemy.hpFill.style.background=pct>50?'linear-gradient(90deg,#e74c3c,#2ecc71)':pct>25?'linear-gradient(90deg,#e74c3c,#f39c12)':'#e74c3c';
            hitEnemy.hpLabel.textContent=Math.max(0,hitEnemy.hp)+'/'+hitEnemy.maxHp;
            crosshairHit.style.borderColor='rgba(255,255,100,0.6)';
            setTimeout(()=>crosshairHit.style.borderColor='rgba(255,50,50,0)',100);

            // 元素命中粒子
            const el=hitEnemy.element;
            createHitParticles(hits[0].point,el.a);
            cameraShake(0.02,0.08);

            if(hitEnemy.hp<=0)destroyEnemy(hitEnemy);
        }
    }else{
        // 未命中 - 弹孔粒子
        if(hits.length===0){
            // 只延伸到足够远
        }
    }
}

// ============ 碰撞 ============
function clampToMap(pos,rad=0.3){
    const c=pos.clone();
    c.x=Math.max(-MAP+rad,Math.min(MAP-rad,c.x));
    c.z=Math.max(-MAP+rad,Math.min(MAP-rad,c.z));
    return c;
}

function checkObstacleCollision(pos,rad=0.3){
    for(const o of obs){
        const box=new THREE.Box3().setFromObject(o);
        const half=box.max.x-box.min.x;
        const halfZ=box.max.z-box.min.z;
        const cx=(box.max.x+box.min.x)/2;
        const cz=(box.max.z+box.min.z)/2;
        const overlapX=half/2+rad-Math.abs(pos.x-cx);
        const overlapZ=halfZ/2+rad-Math.abs(pos.z-cz);
        if(overlapX>0&&overlapZ>0){
            if(overlapX<overlapZ)pos.x+=pos.x>cx?overlapX:-overlapX;
            else pos.z+=pos.z>cz?overlapZ:-overlapZ;
            return true;
        }
    }
    return false;
}

// ============ 敌人 AI ============
function updateEnemyAI(e,delta){
    if(!e.alive)return;

    const dx=player.pos.x-e.group.position.x;
    const dz=player.pos.z-e.group.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const wp=e.waypoints[e.wpIdx];

    switch(e.state){
    case 'patrol':
        e.stayTimer-=delta;
        if(e.stayTimer>0)break;
        // 走向当前路径点
        const pdx=wp.x-e.group.position.x;
        const pdz=wp.z-e.group.position.z;
        const pDist=Math.sqrt(pdx*pdx+pdz*pdz);
        if(pDist<0.5){
            e.wpIdx=(e.wpIdx+1)%e.waypoints.length;
            e.stayTimer=0.3+Math.random()*0.8;
        }else{
            moveEnemy(e,wp.x,wp.z,e.moveSpeed*0.6,delta);
        }
        if(dist<e.detectRange)e.state='chase';
        break;

    case 'chase':
        if(dist>e.detectRange*1.5){e.state='return';break;}
        if(dist<e.attackRange){e.state='attack';break;}
        // 追玩家但不完全重叠
        const chaseTarget=player.pos.clone();
        chaseTarget.y=0;
        moveEnemy(e,chaseTarget.x,chaseTarget.z,e.moveSpeed,delta);
        break;

    case 'attack':
        if(dist>e.attackRange*1.3){e.state='chase';break;}
        // 横向移动（绕玩家走位）
        const perpX=dx/dist,perpZ=-dz/dist;
        const strafeTarget={
            x:player.pos.x+perpX*(e.attackRange*0.7),
            z:player.pos.z+perpZ*(e.attackRange*0.7)
        };
        moveEnemy(e,strafeTarget.x,strafeTarget.z,e.moveSpeed*0.4,delta);

        e.fireTimer-=delta*1000;
        if(e.fireTimer<=0){
            e.fireTimer=ENEMY_FIRE*(0.6+Math.random()*0.6);
            enemyShoot(e);
        }
        break;

    case 'return':
        const home=e.waypoints[0];
        const hdx=home.x-e.group.position.x;
        const hdz=home.z-e.group.position.z;
        if(Math.sqrt(hdx*hdx+hdz*hdz)<1||dist<e.detectRange){
            e.state=dist<e.detectRange?'chase':'patrol';
            e.wpIdx=0;
        }else{
            moveEnemy(e,home.x,home.z,e.moveSpeed*0.8,delta);
        }
        break;
    }

    // 受击闪烁
    if(e.hitFlash>0){
        e.hitFlash-=delta;
        e.group.traverse(c=>{
            if(c.isMesh&&c.material){
                const mats=Array.isArray(c.material)?c.material:[c.material];
                mats.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=2});
            }
        });
    }else{
        e.group.traverse(c=>{
            if(c.isMesh&&c.material){
                const mats=Array.isArray(c.material)?c.material:[c.material];
                mats.forEach(m=>{if(m.emissiveIntensity!==undefined&&!c.userData.isCore&&!c.userData.isGlow&&!c.userData.isMark)m.emissiveIntensity=0});
            }
        });
    }
}

function moveEnemy(e,targetX,targetZ,speed,delta){
    const dx=targetX-e.group.position.x;
    const dz=targetZ-e.group.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<0.1)return;

    const nx=dx/dist, nz=dz/dist;
    const newPos={x:e.group.position.x+nx*speed*delta,z:e.group.position.z+nz*speed*delta};
    // 边界限制
    newPos.x=Math.max(-MAP+0.4,Math.min(MAP-0.4,newPos.x));
    newPos.z=Math.max(-MAP+0.4,Math.min(MAP-0.4,newPos.z));

    // 障碍物检测（简化：绕行）
    const testPos=new THREE.Vector3(newPos.x,0,newPos.z);
    const blocked=checkObstacleCollision(testPos,0.35);
    if(!blocked){
        e.group.position.x=newPos.x;
        e.group.position.z=newPos.z;
    }else{
        // 被阻挡时换个方向尝试
        const alt1={x:e.group.position.x+nx*speed*delta*0.5+nz*speed*delta*0.3,z:e.group.position.z+nz*speed*delta*0.5-nx*speed*delta*0.3};
        alt1.x=Math.max(-MAP+0.4,Math.min(MAP-0.4,alt1.x));
        alt1.z=Math.max(-MAP+0.4,Math.min(MAP-0.4,alt1.z));
        const test2=new THREE.Vector3(alt1.x,0,alt1.z);
        if(!checkObstacleCollision(test2,0.35)){
            e.group.position.x=alt1.x;e.group.position.z=alt1.z;
        }
    }

    // 朝向运动方向
    const angle=Math.atan2(nx,nz);
    e.group.rotation.y=angle;
}

    gameTime=0;shotsFired=0;shotsHit=0;
    statsDiv.innerHTML='';
    gameState='playing';
    overlay.classList.add('hidden');
    if(!isTouchDevice())renderer.domElement.requestPointerLock();
}

startBtn.addEventListener('click',startGame);
document.addEventListener('pointerlockchange',()=>{});
renderer.domElement.addEventListener('click',()=>{
    if(gameState==='playing'&&!document.pointerLockElement&&!isTouchDevice())
        renderer.domElement.requestPointerLock();
});
renderer.domElement.addEventListener('mousedown',e=>{
    if(e.button===0&&gameState==='playing')shoot();
});

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    css2d.setSize(innerWidth,innerHeight);
});

// ============ 更新循环 ============
function update(delta){
    if(gameState!=='playing')return;
    gameTime+=delta;
    shootCD=Math.max(0,shootCD-delta);

    // 触控射击
    if(touch.shooting)shoot();

    // 敌人 AI
    for(const e of enemies)updateEnemyAI(e,delta);

    // 玩家移动
    const fwd=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
    const right=new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
    const md=new THREE.Vector3();

    // 键盘
    if(keys['KeyW'])md.add(fwd);
    if(keys['KeyS'])md.sub(fwd);
    if(keys['KeyA'])md.sub(right);
    if(keys['KeyD'])md.add(right);
    // 触控摇杆
    if(touch.joystick.id>=0){
        md.x+=fwd.x*touch.joystick.dy+right.x*touch.joystick.dx;
        md.z+=fwd.z*touch.joystick.dy+right.z*touch.joystick.dx;
    }
    if(md.length()>0)md.normalize();

    const spd=(keys['ShiftLeft']||keys['ShiftRight']||touch.crouching)?SPEED*0.5:SPEED;
    const tvx=md.x*spd,tvz=md.z*spd;
    player.vel.x+=(tvx-player.vel.x)*Math.min(1,12*delta);
    player.vel.z+=(tvz-player.vel.z)*Math.min(1,12*delta);

    // 跳跃
    if((keys['Space']||touch.jumping)&&player.onGround){
        player.vel.y=JUMP_V;player.onGround=false;touch.jumping=false;
    }
    player.vel.y+=GRAV*delta;

    const tCrouch=(keys['ShiftLeft']||keys['ShiftRight']||touch.crouching)?CROUCH_H:PLAYER_H;
    player.crouching=keys['ShiftLeft']||keys['ShiftRight']||touch.crouching;

    player.pos.x+=player.vel.x*delta;
    player.pos.z+=player.vel.z*delta;
    player.pos.y+=player.vel.y*delta;

    const clamped=clampToMap(player.pos,0.3);
    if(clamped.x!==player.pos.x)player.vel.x=0;
    if(clamped.z!==player.pos.z)player.vel.z=0;
    player.pos.x=clamped.x;player.pos.z=clamped.z;

    // 障碍物碰撞
    checkObstacleCollision(player.pos,0.3);

    if(player.pos.y<=tCrouch){
        player.pos.y=tCrouch;
        player.vel.y=0;
        player.onGround=true;
    }
    player.height+=(tCrouch-player.height)*Math.min(1,8*delta);

    // 相机更新
    camera.quaternion.setFromEuler(new THREE.Euler(player.pitch,player.yaw,0,'YXZ'));
    camera.position.copy(player.pos);
    camera.position.y=player.height;

    // 震动
    if(shakeT>0){
        shakeT-=delta;
        const p=shakeT/shakeD;
        const curI=shakeI*p;
        camera.position.x+=(Math.random()-0.5)*curI;
        camera.position.y+=(Math.random()-0.5)*curI;
        if(shakeT<=0){shakeT=0;shakeI=0;}
    }

    // 枪
    const tgZ=player.crouching?-0.38:-0.5;
    gun.position.z+=(tgZ-gun.position.z)*Math.min(1,10*delta);
    const bob=player.onGround&&md.length()>0?0.002*Math.sin(gameTime*12):0;
    gun.position.y=(player.crouching?-0.17:-0.2)+bob;

    // 能量核心旋转
    gun.children.forEach(c=>{
        if(c.userData.isCore)c.rotation.x+=delta*3;
        if(c.userData.isGlow)c.rotation.z+=delta*2;
        if(c.userData.isMark)c.rotation.y+=delta*2;
    });

    // 敌人朝向（攻击时面对玩家）
    for(const e of enemies){
        if(!e.alive)continue;
        if(e.state==='attack'||e.state==='chase'){
            const t=player.pos.clone();t.y=e.group.position.y+0.5;
            e.group.lookAt(t);
            e.group.rotation.x=0;e.group.rotation.z=0;
        }
        // 元素标记动画
        e.group.traverse(c=>{
            if(c.userData.isMark)c.rotation.y+=delta*2.5;
        });
    }

    // 敌人弹丸
    for(let i=enemyProjectiles.length-1;i>=0;i--){
        const p=enemyProjectiles[i];
        p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
        p.life-=delta;
        const dist=p.mesh.position.distanceTo(player.pos);
        if(dist<0.55&&player.inv<=0){
            player.hp-=ENEMY_DMG;
            player.inv=0.3;
            damageFlash.style.background='rgba(255,0,0,0.3)';
            setTimeout(()=>damageFlash.style.background='rgba(255,0,0,0)',100);
            cameraShake(0.04,0.15);
            const pct=Math.max(0,player.hp/P_MAX_HP)*100;
            healthInner.style.width=pct+'%';
            healthText.textContent=Math.max(0,player.hp)+'/'+P_MAX_HP;
            // 受伤粒子
            createHitParticles(p.mesh.position,0xff4444);
            scene.remove(p.mesh);
            enemyProjectiles.splice(i,1);
            if(player.hp<=0)gameOver(false);
            continue;
        }
        if(p.life<=0||Math.abs(p.mesh.position.x)>MAP||Math.abs(p.mesh.position.z)>MAP||p.mesh.position.y<-1){
            scene.remove(p.mesh);
            enemyProjectiles.splice(i,1);
        }
    }

    if(player.inv>0)player.inv-=delta;

    // 粒子更新
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.vel.y+=GRAV*delta;
        p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
        p.life-=delta;
        p.mesh.material.opacity=Math.max(0,p.life*2);
        p.mesh.material.transparent=true;
        if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
    }
}

function animate(){
    requestAnimationFrame(animate);
    const delta=Math.min(clock.getDelta(),0.05);
    update(delta);
    renderer.render(scene,camera);
    css2d.render(scene,camera);
}
animate();
console.log('✨ 元素射手已加载');
</script>
</body>
