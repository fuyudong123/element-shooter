<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="射击训练场">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<title>射击训练场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Microsoft YaHei','PingFang SC',sans-serif;touch-action:none}
canvas{display:block}
#hud{position:fixed;top:env(safe-area-inset-top,8px);left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 16px;pointer-events:none}
#hud>*{pointer-events:auto}
#playerHealthWrap{background:rgba(0,0,0,0.6);border:2px solid rgba(180,180,180,0.25);border-radius:10px;padding:6px 12px;min-width:160px;backdrop-filter:blur(8px)}
#playerHealthLabel{color:rgba(255,255,255,0.85);font-size:12px;margin-bottom:3px;display:flex;justify-content:space-between}
#playerHealthBarOuter{width:100%;height:12px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden}
#playerHealthBarInner{width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12,#2ecc71);border-radius:6px;transition:width .15s ease}
#healthText{color:rgba(255,255,255,0.75);font-size:11px}
#enemyCount{background:rgba(0,0,0,0.6);border:2px solid rgba(180,180,180,0.25);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;backdrop-filter:blur(8px)}
#crosshair{position:fixed;top:50%;left:50%;z-index:10;transform:translate(-50%,-50%);pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.65)}
#crosshair::before{width:2px;height:16px;top:-8px;left:-1px}
#crosshair::after{width:16px;height:2px;top:-1px;left:-8px}
#crosshair-dot{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.45);position:absolute;top:-1px;left:-1px}
#crosshair-hit{position:fixed;top:50%;left:50%;z-index:9;transform:translate(-50%,-50%);width:36px;height:36px;pointer-events:none;border:2px solid rgba(255,255,100,0);border-radius:50%;transition:border-color .08s ease}
#damageFlash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:8;pointer-events:none;background:rgba(255,0,0,0);transition:background .1s ease}
#touch-controls{position:fixed;bottom:env(safe-area-inset-bottom,12px);left:0;right:0;z-index:20;height:200px}
#joystick-area{position:absolute;left:24px;bottom:10px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#joystick-knob{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.35),rgba(255,255,255,0.12));border:2px solid rgba(255,255,255,0.22);transform:translate(0,0);pointer-events:none}
#btn-group{position:absolute;right:16px;bottom:10px;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.btn-circle{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;color:#fff}
.btn-circle:active,.btn-circle.pressed{transform:scale(0.88)}
#btn-shoot{background:radial-gradient(circle,rgba(255,80,60,0.4),rgba(200,40,20,0.2));width:72px;height:72px;font-size:20px;text-shadow:0 0 8px rgba(255,100,50,0.5);border-color:rgba(255,100,60,0.35)}
#btn-shoot:active,#btn-shoot.pressed{background:radial-gradient(circle,rgba(255,100,80,0.55),rgba(200,40,20,0.3))}
#btn-jump{width:52px;height:52px;background:radial-gradient(circle,rgba(100,200,255,0.25),rgba(60,150,220,0.12));font-size:14px;border-color:rgba(100,200,255,0.22)}
#btn-crouch{width:46px;height:46px;background:radial-gradient(circle,rgba(200,180,100,0.2),rgba(180,150,60,0.1));font-size:13px;border-color:rgba(200,180,100,0.18)}
#btn-row{display:flex;gap:8px;align-items:flex-end}
@media (hover:hover){#touch-controls{display:none!important}}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(10,10,15,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px env(safe-area-inset-right,20px) 20px env(safe-area-inset-left,20px)}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(32px,8vw,52px);margin-bottom:8px;letter-spacing:3px}
#overlay h1.win{color:#2ecc71;text-shadow:0 0 40px rgba(46,204,113,0.3)}
#overlay h1.lose{color:#e74c3c;text-shadow:0 0 40px rgba(231,76,60,0.3)}
#overlay p{font-size:clamp(13px,3.2vw,16px);color:rgba(255,255,255,0.6);margin-bottom:4px;line-height:1.6}
#overlay .key{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:0 7px;font-size:clamp(11px,2.8vw,14px)}
#overlay .btn{margin-top:20px;padding:14px 44px;font-size:clamp(16px,4vw,20px);cursor:pointer;pointer-events:auto;background:linear-gradient(135deg,#4a5568,#2d3748);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:12px;transition:transform .15s,background .15s}
#overlay .btn:hover{transform:scale(1.05);background:linear-gradient(135deg,#5a6578,#3d4758)}
#overlay .btn-restart{background:linear-gradient(135deg,#c0392b,#e74c3c)}
#overlay .btn-restart:hover{background:linear-gradient(135deg,#d0493b,#f75c4c)}
#stats{margin-top:10px;font-size:clamp(12px,3vw,14px);color:rgba(255,255,255,0.4)}
#killList{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:11;pointer-events:none;text-align:center;color:#ffdd44;font-size:14px;text-shadow:0 0 12px rgba(255,200,50,0.4)}
.kill-msg{animation:killFade 1.2s ease forwards;margin-bottom:4px}
@keyframes killFade{0%{opacity:0;transform:translateY(10px) scale(0.9)}20%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}
</style>
</head>
<body>
<div id="hud">
    <div id="playerHealthWrap">
        <div id="playerHealthLabel"><span>❤️ 生命值</span><span id="healthText">100 / 100</span></div>
        <div id="playerHealthBarOuter"><div id="playerHealthBarInner"></div></div>
    </div>
    <div id="enemyCount">🎯 <span id="enemyCountNum">0</span></div>
</div>
<div id="crosshair"><div id="crosshair-dot"></div></div>
<div id="crosshair-hit"></div>
<div id="damageFlash"></div>
<div id="killList"></div>
<div id="touch-controls">
    <div id="joystick-area"><div id="joystick-knob"></div></div>
    <div id="btn-group">
        <button class="btn-circle" id="btn-shoot">⚡</button>
        <div id="btn-row">
            <button class="btn-circle" id="btn-jump">↑</button>
            <button class="btn-circle" id="btn-crouch">↓</button>
        </div>
    </div>
</div>
<div id="overlay">
    <h1 id="overlayTitle">🎯 射击训练场</h1>
    <p>消灭所有敌人即可获胜</p>
    <p id="key-hints">
        <span class="key">W A S D</span> 移动 &nbsp;
        <span class="key">鼠标</span> 视角 &nbsp;
        <span class="key">左键</span> 射击 &nbsp;
        <span class="key">空格</span> 跳跃 &nbsp;
        <span class="key">Shift</span> 下蹲
    </p>
    <button class="btn" id="startBtn">开始战斗</button>
    <div id="stats"></div>
</div>
<script type="importmap">{
"imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}</script>
<script type="module">
import*as THREE from'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

// ===== 常量 =====
const MAP=14,WALL_H=3.5,PLAYER_H=1.7,CROUCH_H=0.8,SPEED=6,JUMP_V=6.5,GRAV=-18,SENS=0.002;
const P_MAX_HP=100,ENEMY_HP=70,DMG=12,ENEMY_FIRE=2000,ENEMY_PS=10,ENEMY_DMG=5;
const HP_HEAL=20,HP_INTERVAL=12,HP_MAX=3,HP_RADIUS=1.2;

// ===== DOM =====
const $=id=>document.getElementById(id);
const overlay=$('overlay'),overlayTitle=$('overlayTitle'),startBtn=$('startBtn');
const healthInner=$('playerHealthBarInner'),healthText=$('healthText');
const enemyCountNum=$('enemyCountNum'),statsDiv=$('stats'),damageFlash=$('damageFlash');
const crosshairHit=$('crosshair-hit'),killList=$('killList'),keyHints=$('key-hints');
const joyArea=$('joystick-area'),joyKnob=$('joystick-knob');
const btnShoot=$('btn-shoot'),btnJump=$('btn-jump'),btnCrouch=$('btn-crouch');

// ===== Three.js 场景（CS2 工业风） =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x141418);
scene.fog=new THREE.Fog(0x141418,30,48);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,60);
camera.position.set(0,PLAYER_H,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
document.body.prepend(renderer.domElement);
const css2d=new CSS2DRenderer();
css2d.setSize(innerWidth,innerHeight);
css2d.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none';
document.body.prepend(css2d.domElement);

// ===== 光照 =====
scene.add(new THREE.AmbientLight(0x334466,0.35));
const hemi=new THREE.HemisphereLight(0x8888cc,0x886644,0.4);
scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffddbb,1.2);
sun.position.set(10,16,12);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=0.5;sun.shadow.camera.far=50;
sun.shadow.camera.left=-20;sun.shadow.camera.right=20;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;
scene.add(sun);
const rim=new THREE.DirectionalLight(0x6688cc,0.25);
rim.position.set(-12,6,-14);
scene.add(rim);

// ===== 地图（工业混凝土风格） =====
const floorMat=new THREE.MeshStandardMaterial({color:0x2a2a30,roughness:0.95,metalness:0.05});
const floor=new THREE.Mesh(new THREE.PlaneGeometry(MAP*2,MAP*2),floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;
scene.add(floor);
const grid=new THREE.GridHelper(MAP*2,28,0x3a3a48,0x2e2e3c);
grid.position.y=0.02;scene.add(grid);

const wallMat=new THREE.MeshStandardMaterial({color:0x363642,roughness:0.85,metalness:0.1});
function addWall(cx,cz,w,h,ry){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.3),wallMat);
    m.position.set(cx,h/2,cz);m.rotation.y=ry;
    m.castShadow=m.receiveShadow=true;scene.add(m);
}
addWall(0,-MAP,MAP*2,WALL_H,0);addWall(0,MAP,MAP*2,WALL_H,0);
addWall(-MAP,0,0.3,WALL_H,0);addWall(MAP,0,0.3,WALL_H,0);
const cm=new THREE.MeshStandardMaterial({color:0x363642,roughness:0.85});
for(const[x,z]of[[-MAP,-MAP],[MAP,-MAP],[-MAP,MAP],[MAP,MAP]]){
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.3,WALL_H,0.3),cm);
    p.position.set(x,WALL_H/2,z);scene.add(p);
}

// 障碍物（工业油桶/木箱）
const obs=[];
function addObs(x,z,w,h,d,color){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color,roughness:0.85,metalness:0.1}));
    m.position.set(x,h/2,z);m.castShadow=m.receiveShadow=true;
    scene.add(m);obs.push(m);return m;
}
addObs(-6,-6,2,1.2,2,0x5a4a3a);addObs(7,-5,2,1.2,2,0x4a5a3a);
addObs(-7,6,2,1.4,2,0x5a5040);addObs(5,7,2.2,1.0,2.2,0x4a4a3a);
addObs(-3,0,1.4,0.7,1.4,0x5a4a3a);addObs(4,-2,1.4,0.7,1.4,0x555540);
addObs(0,4,1.6,0.8,1.6,0x4a5a3a);
const pillMat=new THREE.MeshStandardMaterial({color:0x4a4a5a,roughness:0.7,metalness:0.3});
function addPillar(x,z,r,h){
    const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,12),pillMat);
    m.position.set(x,h/2,z);m.castShadow=m.receiveShadow=true;
    scene.add(m);obs.push(m);return m;
}
addPillar(-8,-8,0.4,3);addPillar(8,8,0.4,3);
addPillar(-8,8,0.4,3);addPillar(8,-8,0.4,3);

// ===== 玩家 =====
const player={
    pos:new THREE.Vector3(0,PLAYER_H,11),vel:new THREE.Vector3(0,0,0),
    yaw:0,pitch:0,hp:P_MAX_HP,onGround:false,crouching:false,height:PLAYER_H,inv:0,
};

// ===== 武器 =====
function createGun(){
    const g=new THREE.Group();
    const bodyMat=new THREE.MeshStandardMaterial({color:0x445566,roughness:0.4,metalness:0.6});
    const darkMat=new THREE.MeshStandardMaterial({color:0x334455,roughness:0.6,metalness:0.4});
    const gripMat=new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.9});

    const body=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.10,0.35),darkMat);
    body.position.set(0,0,0.02);g.add(body);
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.03,0.3,8),bodyMat);
    barrel.rotation.x=Math.PI/2;barrel.position.set(0,0.02,-0.18);g.add(barrel);
    const muzzle=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.025,0.06,8),bodyMat);
    muzzle.rotation.x=Math.PI/2;muzzle.position.set(0,0.02,-0.33);g.add(muzzle);
    const grip=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.10,0.05),gripMat);
    grip.position.set(0,-0.08,0.08);g.add(grip);
    const trig=new THREE.Mesh(new THREE.TorusGeometry(0.03,0.01,6,8,Math.PI),bodyMat);
    trig.position.set(0,-0.03,0.06);trig.rotation.x=0.2;g.add(trig);

    g.position.set(0.25,-0.2,-0.5);
    return g;
}
const gun=createGun();
camera.add(gun);
scene.add(camera);

// ===== 敌人（精致二次元风，CS2 场景中的动漫角色） =====
const enemies=[],enemyProjectiles=[],particles=[];

function createEnemy(x,z){
    const g=new THREE.Group();
    const skin=new THREE.MeshToonMaterial({color:0xffeedd});
    const hairColors=[0x2c3e50,0xe74c3c,0xf39c12,0x8e44ad,0x1a5276,0x7f8c8d,0xd35400,0x16a085];
    const outfitColors=[0x3498db,0xe74c8b,0x2ecc71,0xf39c12,0x9b59b6,0x1abc9c,0xe67e22,0x34495e];
    const ci=Math.floor(Math.random()*8);
    const hairMat=new THREE.MeshToonMaterial({color:hairColors[ci]});
    const outfit=new THREE.MeshToonMaterial({color:outfitColors[ci]});

    // 头发（前发 + 后发 + 侧发）
    const hairBack=new THREE.Mesh(new THREE.ConeGeometry(0.26,0.22,10),hairMat);
    hairBack.position.y=1.06;g.add(hairBack);
    for(let side=-1;side<=1;side+=2){
        const sf=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.15,0.04),hairMat);
        sf.position.set(side*0.16,0.9,0);sf.rotation.z=side*0.15;g.add(sf);
    }

    // 头部
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,14),skin);
    head.position.y=0.86;head.scale.set(1,0.92,0.88);g.add(head);

    // 眼睛（大而有神）
    const eyeMat=new THREE.MeshToonMaterial({color:0xffffff});
    const pupilMat=new THREE.MeshToonMaterial({color:0x2c3e50});
    const highMat=new THREE.MeshBasicMaterial({color:0xffffff});
    for(let side=-1;side<=1;side+=2){
        const eye=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10),eyeMat);
        eye.position.set(side*0.085,0.91,-0.18);eye.scale.set(1,0.7,0.25);g.add(eye);
        const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),pupilMat);
        pupil.position.set(side*0.085,0.905,-0.205);pupil.scale.set(1,0.8,0.15);g.add(pupil);
        const hl=new THREE.Mesh(new THREE.SphereGeometry(0.018,6,6),highMat);
        hl.position.set(side*0.07,0.92,-0.21);g.add(hl);
    }

    // 身体（修身制服）
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.30,0.38,10),outfit);
    body.position.y=0.36;g.add(body);

    // 领带
    const tie=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.16,0.02),new THREE.MeshToonMaterial({color:0xc0392b}));
    tie.position.set(0,0.4,0.18);g.add(tie);

    // 手臂
    const armMat=new THREE.MeshToonMaterial({color:0xffeedd});
    for(let side=-1;side<=1;side+=2){
        const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,0.24,6),armMat);
        arm.position.set(side*0.2,0.38,0);arm.rotation.z=side*0.2;g.add(arm);
        const hand=new THREE.Mesh(new THREE.SphereGeometry(0.035,6,6),armMat);
        hand.position.set(side*0.23,0.25,0);g.add(hand);
    }

    // 腿
    const legMat=new THREE.MeshToonMaterial({color:outfitColors[ci]});
    for(let side=-1;side<=1;side+=2){
        const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.05,0.18,6),legMat);
        leg.position.set(side*0.1,0.12,0);g.add(leg);
        const shoe=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.04,0.12),new THREE.MeshToonMaterial({color:0x2c3e50}));
        shoe.position.set(side*0.1,0.02,0.03);g.add(shoe);
    }

    // 血条（CSS2D）
    const hpDiv=document.createElement('div');
    hpDiv.style.cssText='width:52px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.12)';
    const hpFill=document.createElement('div');
    hpFill.style.cssText='width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#2ecc71);border-radius:2px;transition:width .15s';
    hpDiv.appendChild(hpFill);
    const hpLabel=document.createElement('div');
    hpLabel.style.cssText='color:#fff;font-size:9px;text-align:center;text-shadow:0 0 3px #000;margin-top:1px';
    hpLabel.textContent=ENEMY_HP+'/'+ENEMY_HP;
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center';
    wrap.appendChild(hpDiv);wrap.appendChild(hpLabel);
    const hpObj=new CSS2DObject(wrap);
    hpObj.position.set(0,1.5,0);
    g.add(hpObj);

    g.position.set(x,0,z);

    const offsets=[[0,0],[3+Math.random()*3,3+Math.random()*3],[-2-Math.random()*3,2+Math.random()*3],
                   [2+Math.random()*3,-3-Math.random()*3],[-3-Math.random()*3,-2-Math.random()*3]].map(([ox,oz])=>({
        x:Math.max(-MAP+1,Math.min(MAP-1,x+ox)),
        z:Math.max(-MAP+1,Math.min(MAP-1,z+oz))
    }));

    const data={
        group:g,hp:ENEMY_HP,maxHp:ENEMY_HP,alive:true,
        hpFill,hpLabel,
        fireTimer:ENEMY_FIRE*(0.3+Math.random()*0.4),hitFlash:0,
        state:'patrol',moveSpeed:0.8+Math.random()*0.5,
        waypoints:offsets,wpIdx:0,stayTimer:0,
        stuckTimer:0,stuckCheckPos:{x:g.position.x,z:g.position.z},
        detectRange:8,attackRange:4.5,
    };
    scene.add(g);
    return data;
}

// ===== 放置敌人 =====
const spawns=[[-8,-8],[-6,-2],[7,-7],[-7,7],[1,-9],[9,5],[4,-5],[-4,9]];
for(const[posX,posZ]of spawns){
    const e=createEnemy(posX,posZ);
    const sp=e.group.position.clone();
    checkObstacleCollision(sp,0.35);
    e.group.position.x=sp.x;e.group.position.z=sp.z;
    enemies.push(e);
}
enemyCountNum.textContent=enemies.length;

// ===== 血包 =====
const healthPickups=[];
let hpSpawnTimer=HP_INTERVAL;

function createHealthPickup(){
    if(healthPickups.filter(p=>p.active).length>=HP_MAX)return;
    let x,z,valid;
    for(let t=0;t<25;t++){
        x=(Math.random()-0.5)*(MAP*2-3);z=(Math.random()-0.5)*(MAP*2-3);
        const dp=Math.sqrt((x-player.pos.x)**2+(z-player.pos.z)**2);
        const de=enemies.some(e=>e.alive&&Math.sqrt((x-e.group.position.x)**2+(z-e.group.position.z)**2)<2);
        const onO=obs.some(o=>{const b=new THREE.Box3().setFromObject(o);return x>b.min.x&&x<b.max.x&&z>b.min.z&&z<b.max.z});
        if(dp>4&&!de&&!onO){valid=true;break;}
    }
    if(!valid)return;

    const g=new THREE.Group();
    const white=new THREE.MeshToonMaterial({color:0xffffff});
    const green=new THREE.MeshToonMaterial({color:0x2ecc71,emissive:0x2ecc71,emissiveIntensity:0.6});
    const base=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,0.04,12),white);
    base.position.y=0.02;g.add(base);
    const hB=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.04,0.05),green);
    hB.position.set(0,0.06,0);g.add(hB);
    const vB=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.04,0.2),green);
    vB.position.set(0,0.06,0);g.add(vB);

    g.position.set(x,0.25,z);
    const data={group:g,active:true,bobPhase:Math.random()*Math.PI*2};
    scene.add(g);
    healthPickups.push(data);
}

function updateJoystick(t){
    const rect=joyArea.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    let dx=t.clientX-cx,dy=t.clientY-cy;
    const dist=Math.sqrt(dx*dx+dy*dy),maxR=50;
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
    touch.joystick.dx=dx/maxR;touch.joystick.dy=dy/maxR;
    joyKnob.style.transform=`translate(${dx}px,${dy}px)`;
}

// ===== 射击 =====
let muzzleFlash=null,shootCD=0,shotsFired=0,shotsHit=0;

function shoot(){
    if(shootCD>0)return;
    shootCD=0.12;shotsFired++;
    if(muzzleFlash){gun.remove(muzzleFlash);muzzleFlash=null;}
    const flash=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),new THREE.MeshBasicMaterial({color:0xffdd88,transparent:true,opacity:0.9}));
    flash.position.set(0,0.01,-0.3);gun.add(flash);muzzleFlash=flash;
    setTimeout(()=>{if(muzzleFlash===flash){gun.remove(flash);muzzleFlash=null;}},50);
    gun.position.z=-0.44;setTimeout(()=>gun.position.z=-0.5,60);

    const raycaster=new THREE.Raycaster();
    raycaster.setFromCamera({x:0,y:0},camera);
    const targets=enemies.filter(e=>e.alive).flatMap(e=>{const ms=[];e.group.traverse(c=>{if(c.isMesh)ms.push(c)});return ms});
    const hits=raycaster.intersectObjects(targets);
    if(hits.length>0){
        let he=null;
        for(const e of enemies){
            if(!e.alive)continue;
            let f=false;e.group.traverse(c=>{if(c===hits[0].object)f=true});
            if(f){he=e;break;}
        }
        if(he){
            shotsHit++;he.hp-=DMG;he.hitFlash=0.2;
            const pct=Math.max(0,he.hp/he.maxHp)*100;
            he.hpFill.style.width=pct+'%';
            he.hpFill.style.background=pct>50?'linear-gradient(90deg,#e74c3c,#2ecc71)':pct>25?'linear-gradient(90deg,#e74c3c,#f39c12)':'#e74c3c';
            he.hpLabel.textContent=Math.max(0,he.hp)+'/'+he.maxHp;
            crosshairHit.style.borderColor='rgba(255,255,100,0.6)';setTimeout(()=>crosshairHit.style.borderColor='rgba(255,50,50,0)',100);
            createHitParticles(hits[0].point,0xffaa44);
            cameraShake(0.02,0.08);
            if(he.hp<=0)destroyEnemy(he);
        }
    }
}

function destroyEnemy(enemy){
    enemy.alive=false;

// ===== 碰撞 =====
function clampToMap(pos,rad=0.3){
    const c=pos.clone();c.x=Math.max(-MAP+rad,Math.min(MAP-rad,c.x));c.z=Math.max(-MAP+rad,Math.min(MAP-rad,c.z));return c;
}
function checkObstacleCollision(pos,rad=0.3){
    for(const o of obs){
        const b=new THREE.Box3().setFromObject(o);
        const hx=b.max.x-b.min.x,hz=b.max.z-b.min.z;
        const cx=(b.max.x+b.min.x)/2,cz=(b.max.z+b.min.z)/2;
        const ox=hx/2+rad-Math.abs(pos.x-cx),oz=hz/2+rad-Math.abs(pos.z-cz);
        if(ox>0&&oz>0){
            if(ox<oz)pos.x+=pos.x>cx?ox:-ox;
            else pos.z+=pos.z>cz?oz:-oz;
            return true;
        }
    }
    return false;
}

// ===== 敌人 AI =====
function updateEnemyAI(e,delta){
    if(!e.alive)return;
    const dx=player.pos.x-e.group.position.x,dz=player.pos.z-e.group.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const wp=e.waypoints[e.wpIdx];

    switch(e.state){
    case'patrol':
        e.stayTimer-=delta;
        if(e.stayTimer>0)break;
        const pdx=wp.x-e.group.position.x,pdz=wp.z-e.group.position.z;
        if(Math.sqrt(pdx*pdx+pdz*pdz)<0.5){
            e.wpIdx=(e.wpIdx+1)%e.waypoints.length;
            e.stayTimer=0.5+Math.random()*1.2;
        }else moveEnemy(e,wp.x,wp.z,e.moveSpeed*0.6,delta);
        if(dist<e.detectRange)e.state='chase';
        break;
    case'chase':
        if(dist>e.detectRange*1.5){e.state='return';break;}
        if(dist<e.attackRange){e.state='attack';break;}
        moveEnemy(e,player.pos.x,player.pos.z,e.moveSpeed,delta);
        break;
    case'attack':
        if(dist>e.attackRange*1.3){e.state='chase';break;}
        const px=dx/dist,pz=-dz/dist;
        moveEnemy(e,player.pos.x+px*(e.attackRange*0.7),player.pos.z+pz*(e.attackRange*0.7),e.moveSpeed*0.35,delta);
        e.fireTimer-=delta*1000;
        if(e.fireTimer<=0){e.fireTimer=ENEMY_FIRE*(0.6+Math.random()*0.6);enemyShoot(e);}
        break;
    case'return':
        const h=e.waypoints[0];
        if(Math.sqrt((h.x-e.group.position.x)**2+(h.z-e.group.position.z)**2)<1||dist<e.detectRange){
            e.state=dist<e.detectRange?'chase':'patrol';e.wpIdx=0;
        }else moveEnemy(e,h.x,h.z,e.moveSpeed*0.8,delta);
        break;
    }

    // 卡住检测
    e.stuckTimer+=delta;
    if(e.stuckTimer>=1.5){
        e.stuckTimer=0;
        const moved=Math.sqrt((e.group.position.x-e.stuckCheckPos.x)**2+(e.group.position.z-e.stuckCheckPos.z)**2);
        if(moved<0.2){
            const a=Math.random()*Math.PI*2;
            const ex=Math.max(-MAP+0.4,Math.min(MAP-0.4,e.group.position.x+Math.sin(a)*2));
            const ez=Math.max(-MAP+0.4,Math.min(MAP-0.4,e.group.position.z+Math.cos(a)*2));
            const tp=new THREE.Vector3(ex,0,ez);checkObstacleCollision(tp,0.35);
            e.group.position.x=tp.x;e.group.position.z=tp.z;
        }
        e.stuckCheckPos.x=e.group.position.x;e.stuckCheckPos.z=e.group.position.z;
    }

    // 强制推出障碍物
    const cp=e.group.position.clone();
    checkObstacleCollision(cp,0.35);
    e.group.position.x=cp.x;e.group.position.z=cp.z;

    // 受击闪烁
    if(e.hitFlash>0){
        e.hitFlash-=delta;
        e.group.traverse(c=>{if(c.isMesh&&c.material){const ms=Array.isArray(c.material)?c.material:[c.material];ms.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=2})}});
    }else{
        e.group.traverse(c=>{if(c.isMesh&&c.material){const ms=Array.isArray(c.material)?c.material:[c.material];ms.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=0})}});
    }
}

function moveEnemy(e,targetX,targetZ,speed,delta){
    // 每帧强制推出障碍物
    const cur=e.group.position.clone();
    checkObstacleCollision(cur,0.35);
    e.group.position.x=cur.x;e.group.position.z=cur.z;

    const dx=targetX-e.group.position.x,dz=targetZ-e.group.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<0.1)return;
    const nx=dx/dist,nz=dz/dist;
    const np={x:e.group.position.x+nx*speed*delta,z:e.group.position.z+nz*speed*delta};
    np.x=Math.max(-MAP+0.4,Math.min(MAP-0.4,np.x));np.z=Math.max(-MAP+0.4,Math.min(MAP-0.4,np.z));
    const tp=new THREE.Vector3(np.x,0,np.z);
    checkObstacleCollision(tp,0.35);
    e.group.position.x=Math.max(-MAP+0.4,Math.min(MAP-0.4,tp.x));
    e.group.position.z=Math.max(-MAP+0.4,Math.min(MAP-0.4,tp.z));
    e.group.rotation.y=Math.atan2(nx,nz);
}

function startGame(){
    player.pos.set(0,PLAYER_H,11);player.vel.set(0,0,0);
    player.hp=P_MAX_HP;player.onGround=false;player.inv=0;
    player.yaw=0;player.pitch=0;
    camera.quaternion.setFromEuler(new THREE.Euler(0,0,0,'YXZ'));

        e.state='patrol';e.stayTimer=0.5;e.wpIdx=0;e.stuckTimer=0;

    for(const p of enemyProjectiles)scene.remove(p.mesh);
    for(const p of particles)scene.remove(p.mesh);
    for(const p of healthPickups)scene.remove(p.group);

    hpSpawnTimer=HP_INTERVAL;

}

// ===== 更新循环 =====
function update(delta){
    if(gameState!=='playing')return;
    gameTime+=delta;shootCD=Math.max(0,shootCD-delta);
    if(touch.shooting)shoot();

    // 血包
    hpSpawnTimer-=delta;
    if(hpSpawnTimer<=0){hpSpawnTimer=HP_INTERVAL*(0.7+Math.random()*0.6);createHealthPickup();}
    for(let i=healthPickups.length-1;i>=0;i--){
        const p=healthPickups[i];
        if(!p.active)continue;
        p.bobPhase+=delta*2;p.group.position.y=0.25+Math.sin(p.bobPhase)*0.06;
        p.group.rotation.y+=delta*1.2;
        if(p.group.position.distanceTo(player.pos)<HP_RADIUS){
            const heal=Math.min(HP_HEAL,P_MAX_HP-player.hp);
            if(heal>0){
                player.hp+=heal;
                const pct=player.hp/P_MAX_HP*100;
                healthInner.style.width=pct+'%';healthText.textContent=player.hp+'/'+P_MAX_HP;
                const msg=document.createElement('div');msg.className='kill-msg';msg.style.color='#2ecc71';msg.textContent='+'+heal+' ❤️';
                killList.appendChild(msg);setTimeout(()=>msg.remove(),1300);
            }
            p.active=false;scene.remove(p.group);
        }
    }

    // 敌人 AI
    for(const e of enemies)updateEnemyAI(e,delta);

    // 玩家移动
    const fwd=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
    const right=new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
    const md=new THREE.Vector3();
    if(keys['KeyW'])md.add(fwd);if(keys['KeyS'])md.sub(fwd);
    if(keys['KeyA'])md.sub(right);if(keys['KeyD'])md.add(right);
    if(touch.joystick.id>=0){md.x+=fwd.x*touch.joystick.dy+right.x*touch.joystick.dx;md.z+=fwd.z*touch.joystick.dy+right.z*touch.joystick.dx}
    if(md.length()>0)md.normalize();
    const spd=(keys['ShiftLeft']||keys['ShiftRight']||touch.crouching)?SPEED*0.5:SPEED;
    player.vel.x+=(md.x*spd-player.vel.x)*Math.min(1,12*delta);
    player.vel.z+=(md.z*spd-player.vel.z)*Math.min(1,12*delta);
    if((keys['Space']||touch.jumping)&&player.onGround){player.vel.y=JUMP_V;player.onGround=false;touch.jumping=false}
    player.vel.y+=GRAV*delta;
    const tC=(keys['ShiftLeft']||keys['ShiftRight']||touch.crouching)?CROUCH_H:PLAYER_H;
    player.crouching=keys['ShiftLeft']||keys['ShiftRight']||touch.crouching;
    player.pos.x+=player.vel.x*delta;player.pos.z+=player.vel.z*delta;player.pos.y+=player.vel.y*delta;
    const cl=clampToMap(player.pos,0.3);
    if(cl.x!==player.pos.x)player.vel.x=0;if(cl.z!==player.pos.z)player.vel.z=0;
    player.pos.x=cl.x;player.pos.z=cl.z;
    checkObstacleCollision(player.pos,0.3);
    if(player.pos.y<=tC){player.pos.y=tC;player.vel.y=0;player.onGround=true}
    player.height+=(tC-player.height)*Math.min(1,8*delta);

    camera.quaternion.setFromEuler(new THREE.Euler(player.pitch,player.yaw,0,'YXZ'));
    camera.position.copy(player.pos);camera.position.y=player.height;
    if(shakeT>0){shakeT-=delta;const p=shakeT/shakeD,ci=shakeI*p;camera.position.x+=(Math.random()-0.5)*ci;camera.position.y+=(Math.random()-0.5)*ci;if(shakeT<=0){shakeT=0;shakeI=0}}

    // 枪
    gun.position.z+=(player.crouching?-0.38:-0.5-gun.position.z)*Math.min(1,10*delta);
    const bob=player.onGround&&md.length()>0?0.002*Math.sin(gameTime*12):0;
    gun.position.y=(player.crouching?-0.17:-0.2)+bob;

    // 敌人朝向
    for(const e of enemies){
        if(!e.alive)continue;
        if(e.state==='attack'||e.state==='chase'){
            const t=player.pos.clone();t.y=e.group.position.y+0.5;
            e.group.lookAt(t);e.group.rotation.x=0;e.group.rotation.z=0;
        }
    }

    // 弹丸
    for(let i=enemyProjectiles.length-1;i>=0;i--){
        const p=enemyProjectiles[i];
        p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
        p.life-=delta;
        if(p.mesh.position.distanceTo(player.pos)<0.55&&player.inv<=0){
            player.hp-=ENEMY_DMG;player.inv=0.3;
            damageFlash.style.background='rgba(255,0,0,0.3)';setTimeout(()=>damageFlash.style.background='rgba(255,0,0,0)',100);
            cameraShake(0.04,0.15);
            const pct=Math.max(0,player.hp/P_MAX_HP)*100;
            healthInner.style.width=pct+'%';healthText.textContent=Math.max(0,player.hp)+'/'+P_MAX_HP;
            createHitParticles(p.mesh.position,0xff4444);
            scene.remove(p.mesh);enemyProjectiles.splice(i,1);
            if(player.hp<=0)gameOver(false);continue;
        }
        if(p.life<=0||Math.abs(p.mesh.position.x)>MAP||Math.abs(p.mesh.position.z)>MAP||p.mesh.position.y<-1){
            scene.remove(p.mesh);enemyProjectiles.splice(i,1);
        }
    }
    if(player.inv>0)player.inv-=delta;

    // 粒子
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];p.vel.y+=GRAV*delta;
        p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
        p.life-=delta;p.mesh.material.opacity=Math.max(0,p.life*2);p.mesh.material.transparent=true;
        if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1)}
    }
}

function animate(){requestAnimationFrame(animate);const delta=Math.min(clock.getDelta(),0.05);update(delta);renderer.render(scene,camera);css2d.render(scene,camera)}
animate();
console.log('🎯 射击训练场');
</script>
</body>
